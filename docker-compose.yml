services:
  holloway:
    build: .
    restart: unless-stopped
    environment:
      HOLLOWAY_ADDR: ":8080"
      HOLLOWAY_DB: "/data/holloway.db"
      HOLLOWAY_ADMIN_PASSWORD: "${HOLLOWAY_ADMIN_PASSWORD:?set HOLLOWAY_ADMIN_PASSWORD}"
      HOLLOWAY_BOOTSTRAP_TOKEN: "${HOLLOWAY_BOOTSTRAP_TOKEN:-}"
      HOLLOWAY_BOOTSTRAP_TUNNEL_SECRET: "${HOLLOWAY_BOOTSTRAP_TUNNEL_SECRET:-}"
      HOLLOWAY_WEBHOOK_RATE_LIMIT: "${HOLLOWAY_WEBHOOK_RATE_LIMIT:-300}"
    volumes:
      - holloway-data:/data
    # Not published to the host: only Caddy reaches it, over the compose network.
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - holloway
    environment:
      HOLLOWAY_DOMAIN: "${HOLLOWAY_DOMAIN:?set HOLLOWAY_DOMAIN (e.g. hooks.example.com)}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  holloway-data:
  caddy-data:
  caddy-config:
